<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>めっちゃカメレオン P2P オンラインゲーム（URL接続版）</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #222;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #ui {
      margin-top: 10px;
    }
    canvas {
      background: #111;
      border: 2px solid #555;
      margin-top: 10px;
    }
    button, textarea {
      margin: 4px;
    }
  </style>
</head>
<body>
  <h1>めっちゃカメレオン P2P オンラインゲーム（URL接続版）</h1>
  <p>
    ホストは「ホスト開始」ボタンを押すだけで、接続用 URL が生成されます。<br>
    ゲストはその URL を開くだけで自動接続できます。
  </p>

  <div id="ui">
    <button id="hostBtn">ホスト開始（URL生成）</button>
    <textarea id="shareBox" cols="60" rows="4"
      placeholder="ホストが生成したURLがここに表示されます"></textarea>
    <div>
      <span>接続状態: </span><span id="connStatus">未接続</span>
    </div>
  </div>

  <canvas id="game" width="800" height="450"></canvas>

  <script>
    // ============================
    //  WebRTC P2P（URL接続版）
    // ============================
    let pc;
    let dataChannel;
    const connStatus = document.getElementById("connStatus");
    const shareBox = document.getElementById("shareBox");

    const config = {
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    };

    function logStatus(msg) {
      connStatus.textContent = msg;
      console.log("[P2P]", msg);
    }

    // SDP を Base64 にして URL に埋め込む
    function createShareURL(sdp) {
      const encoded = btoa(JSON.stringify(sdp));
      return location.origin + location.pathname + "#offer=" + encoded;
    }

    async function createPeerConnection(isHost) {
      pc = new RTCPeerConnection(config);

      pc.onicecandidate = (e) => {
        if (e.candidate) return;

        if (isHost) {
          const url = createShareURL(pc.localDescription);
          shareBox.value = "このURLを相手に送ってください:\n\n" + url;
        }
      };

      pc.onconnectionstatechange = () => {
        logStatus(pc.connectionState);
      };

      if (isHost) {
        dataChannel = pc.createDataChannel("chameleon");
        setupDataChannel();

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
      } else {
        pc.ondatachannel = (e) => {
          dataChannel = e.channel;
          setupDataChannel();
        };
      }
    }

    function setupDataChannel() {
      dataChannel.onopen = () => logStatus("DataChannel オープン");
      dataChannel.onclose = () => logStatus("DataChannel クローズ");
      dataChannel.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleRemoteMessage(msg);
      };
    }

    function sendMessage(msg) {
      if (dataChannel && dataChannel.readyState === "open") {
        dataChannel.send(JSON.stringify(msg));
      }
    }

    // ============================
    //  URL を開いたゲストの処理
    // ============================
    window.addEventListener("load", async () => {
      const hash = location.hash;

      if (hash.startsWith("#offer=")) {
        const encoded = hash.replace("#offer=", "");
        const sdp = JSON.parse(atob(encoded));

        await createPeerConnection(false);
        await pc.setRemoteDescription(sdp);

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        shareBox.value =
          "ホストにこのアンサーを送ってください:\n\n" +
          JSON.stringify(pc.localDescription);
      }
    });

    // ============================
    //  ホスト開始ボタン
    // ============================
    document.getElementById("hostBtn").onclick = async () => {
      await createPeerConnection(true);
      logStatus("ホストとして SDP を生成中…");
    };

    // ============================
    //  ゲームロジック（前と同じ）
    // ============================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const COLORS = [
      { name: "赤", code: "#ff5555", ability: "attack" },
      { name: "緑", code: "#55ff55", ability: "stealth" },
      { name: "青", code: "#5599ff", ability: "speed" }
    ];

    const zones = [
      { x: 0,   y: 0,   w: 260, h: 450, colorIndex: 0 },
      { x: 260, y: 0,   w: 280, h: 450, colorIndex: 1 },
      { x: 540, y: 0,   w: 260, h: 450, colorIndex: 2 }
    ];

    const platforms = [
      { x: 80,  y: 360, w: 120, h: 10 },
      { x: 320, y: 300, w: 160, h: 10 },
      { x: 600, y: 260, w: 120, h: 10 },
      { x: 420, y: 180, w: 120, h: 10 }
    ];

    const goal = { x: 720, y: 60, r: 25 };
    const gravity = 0.4;

    const myChameleon = {
      x: 60, y: 380, vx: 0, vy: 0, r: 18,
      colorIndex: 0, baseSpeed: 2.2, isMe: true,
      onGround: false, respawnX: 60, respawnY: 380
    };

    const remoteChameleon = {
      x: 740, y: 380, vx: 0, vy: 0, r: 18,
      colorIndex: 2, isMe: false,
      onGround: false, respawnX: 740, respawnY: 380
    };

    let keys = {};
    let winnerText = "";
    let lastColorChange = 0;

    window.addEventListener("keydown", (e) => keys[e.key] = true);
    window.addEventListener("keyup", (e) => keys[e.key] = false);

    function getAbility(ch) {
      return COLORS[ch.colorIndex].ability;
    }

    function updateMyChameleon() {
      const ability = getAbility(myChameleon);
      const speed = ability === "speed" ? myChameleon.baseSpeed * 1.8 : myChameleon.baseSpeed;

      if (keys["ArrowLeft"]) myChameleon.vx = -speed;
      else if (keys["ArrowRight"]) myChameleon.vx = speed;
      else myChameleon.vx = 0;

      if (ability === "speed" && keys["ArrowUp"] && myChameleon.onGround) {
        myChameleon.vy = -8;
        myChameleon.onGround = false;
      }

      if (keys[" "] && performance.now() - lastColorChange > 200) {
        myChameleon.colorIndex = (myChameleon.colorIndex + 1) % COLORS.length;
        lastColorChange = performance.now();
      }

      myChameleon.vy += gravity;
      myChameleon.x += myChameleon.vx;
      myChameleon.y += myChameleon.vy;

      myChameleon.x = Math.max(myChameleon.r, Math.min(canvas.width - myChameleon.r, myChameleon.x));
      if (myChameleon.y > canvas.height - myChameleon.r) {
        myChameleon.y = canvas.height - myChameleon.r;
        myChameleon.vy = 0;
        myChameleon.onGround = true;
      }

      myChameleon.onGround = false;
      platforms.forEach(p => {
        if (
          myChameleon.x > p.x &&
          myChameleon.x < p.x + p.w &&
          myChameleon.y + myChameleon.r > p.y &&
          myChameleon.y + myChameleon.r < p.y + p.h + 10 &&
          myChameleon.vy >= 0
        ) {
          myChameleon.y = p.y - myChameleon.r;
          myChameleon.vy = 0;
          myChameleon.onGround = true;
        }
      });

      sendMessage({
        type: "state",
        x: myChameleon.x,
        y: myChameleon.y,
        colorIndex: myChameleon.colorIndex
      });
    }

    function handleRemoteMessage(msg) {
      if (msg.type === "state") {
        remoteChameleon.x = msg.x;
        remoteChameleon.y = msg.y;
        remoteChameleon.colorIndex = msg.colorIndex;
      } else if (msg.type === "win") {
        winnerText = msg.text;
      } else if (msg.type === "respawn") {
        remoteChameleon.x = remoteChameleon.respawnX;
        remoteChameleon.y = remoteChameleon.respawnY;
      }
    }

    function getZoneAt(x, y) {
      return zones.find(z => x > z.x && x < z.x + z.w && y > z.y && y < z.y + z.h);
    }

    function checkInteractions() {
      if (winnerText) return;

      const myAbility = getAbility(myChameleon);
      const remoteAbility = getAbility(remoteChameleon);

      const dx = myChameleon.x - remoteChameleon.x;
      const dy = myChameleon.y - remoteChameleon.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      const remoteZone = getZoneAt(remoteChameleon.x, remoteChameleon.y);
      const remoteInStealth =
        remoteAbility === "stealth" &&
        remoteZone &&
        remoteZone.colorIndex === remoteChameleon.colorIndex;

      if (dist < myChameleon.r + remoteChameleon.r + 4) {
        if (myAbility === "attack" && !remoteInStealth) {
          sendMessage({ type: "respawn" });
        }
      }

      const dxGoal = myChameleon.x - goal.x;
      const dyGoal = myChameleon.y - goal.y;
      const distGoal = Math.sqrt(dxGoal * dxGoal + dyGoal * dyGoal);

      if (distGoal < myChameleon.r + goal.r) {
        winnerText = "あなたがゴール！勝ち！";
        sendMessage({ type: "win", text: "相手がゴール！あなたの負け…" });
      }
    }

    function drawBackground() {
      zones.forEach(z => {
        ctx.fillStyle = COLORS[z.colorIndex].code;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(z.x, z.y, z.w, z.h);
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = "#fff";
        ctx.font = "16px sans-serif";
        ctx.fillText(COLORS[z.colorIndex].name + "ゾーン", z.x + 10, 24);
      });

      ctx.fillStyle = "#888";
      platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

      ctx.fillStyle = "#ffd700";
      ctx.beginPath();
      ctx.arc(goal.x, goal.y, goal.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.fillText("ゴール", goal.x - 18, goal.y + 4);
    }

    function drawChameleon(ch) {
      const color = COLORS[ch.colorIndex].code;
      const ability = getAbility(ch);

      const zone = getZoneAt(ch.x, ch.y);
      if (ability === "stealth" && zone && zone.colorIndex === ch.colorIndex) {
        ctx.globalAlpha = 0.4;
      } else {
        ctx.globalAlpha = 1.0;
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(ch.x, ch.y, ch.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(ch.x + ch.r / 2, ch.y - ch.r / 3, ch.r / 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(ch.x + ch.r / 2, ch.y - ch.r / 3, ch.r / 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1.0;
    }

    function drawUI() {
      ctx.fillStyle = "#fff";
      ctx.font = "16px sans-serif";
      ctx.fillText("矢印キー: 移動 / （青のとき）↑でジャンプ / スペース: 色チェンジ", 10, 430);

      const myAbility = getAbility(myChameleon);
      ctx.fillText(
        "あなたの色: " + COLORS[myChameleon.colorIndex].name +
        "（能力: " +
        (myAbility === "attack" ? "攻撃" :
         myAbility === "stealth" ? "ステルス" :
         "スピード＆ジャンプ") +
        "）",
        10,
        410
      );
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawChameleon(myChameleon);
      drawChameleon(remoteChameleon);
      drawUI();

      if (winnerText) {
        ctx.fillStyle = "#fff";
        ctx.font = "28px sans-serif";
        ctx.fillText(winnerText, 200, 220);
      }
    }

    function loop() {
      updateMyChameleon();
      checkInteractions();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
