<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Three.js めっちゃカメレオン 3D オンライン</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; font-family:sans-serif; }
    #info { position:fixed; top:10px; left:10px; z-index:10; }
    #status { position:fixed; top:30px; left:10px; z-index:10; }
    #invite-area { position:fixed; top:60px; left:10px; z-index:10; background:#222; padding:10px; border-radius:8px; max-width:400px; }
    #share-url { word-break:break-all; background:#333; padding:8px; border-radius:6px; margin-top:4px; }
    button { padding:4px 8px; cursor:pointer; }
  </style>
</head>
<body>
<div id="info">
  WASD: 移動 / ↑キー: ジャンプ（青能力） / スペース: 色チェンジ
</div>
<div id="status">通信準備中...</div>
<div id="invite-area" style="display:none;">
  <p>👇 このURLを友達に送ってね！</p>
  <div id="share-url"></div>
  <button onclick="copyURL()">URLをコピー</button>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
/* ============================
   PeerJS 通信
============================ */
let peer = null;
let conn = null;
let isHost = false;

const statusEl = document.getElementById("status");
const inviteArea = document.getElementById("invite-area");
const shareUrlEl = document.getElementById("share-url");

const urlParams = new URLSearchParams(location.search);
const roomId = urlParams.get("room");

if (!roomId) {
  isHost = true;
  peer = new Peer();
  peer.on("open", id => {
    statusEl.innerText = "友達の参加を待っています...";
    inviteArea.style.display = "block";
    const inviteUrl = `${location.origin}${location.pathname}?room=${id}`;
    shareUrlEl.innerText = inviteUrl;
  });
  peer.on("connection", connection => {
    conn = connection;
    setupConnection();
  });
} else {
  isHost = false;
  peer = new Peer();
  peer.on("open", () => {
    statusEl.innerText = "友達に接続中...";
    conn = peer.connect(roomId);
    setupConnection();
  });
}

function setupConnection() {
  conn.on("open", () => {
    statusEl.innerText = "接続しました！オンライン開始！";
    inviteArea.style.display = "none";
  });
  conn.on("data", msg => handleRemoteMessage(msg));
  conn.on("close", () => statusEl.innerText = "通信が切断されました。");
}

function sendMessage(msg) {
  if (conn && conn.open) conn.send(msg);
}

function copyURL() {
  navigator.clipboard.writeText(shareUrlEl.innerText);
  alert("URLをコピーしました！");
}

/* ============================
   Three.js 基本セット
============================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 4, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

/* ============================
   色ゾーン（床）
============================ */
const zoneColors = [
  { name:"赤",  color:0xff5555, ability:"attack" },
  { name:"緑",  color:0x55ff55, ability:"stealth" },
  { name:"青",  color:0x5599ff, ability:"speed" }
];

const zones = [];
for (let i = 0; i < 3; i++) {
  const geo = new THREE.BoxGeometry(6, 0.5, 20);
  const mat = new THREE.MeshStandardMaterial({
    color: zoneColors[i].color,
    transparent: true,
    opacity: 0.4
  });
  const zone = new THREE.Mesh(geo, mat);
  zone.position.set(i * 6 - 6, -0.25, 0);
  scene.add(zone);
  zones.push(zone);
}

/* ============================
   カメレオン（自分＆相手）
============================ */
let myColorIndex = 0;

const chamGeo = new THREE.BoxGeometry(1, 1, 2);
const myChamMat = new THREE.MeshStandardMaterial({
  color: zoneColors[myColorIndex].color
});
const myCham = new THREE.Mesh(chamGeo, myChamMat);
myCham.position.set(-6, 1, 0);
scene.add(myCham);

const oppChamMat = new THREE.MeshStandardMaterial({
  color: 0x8888ff
});
const oppCham = new THREE.Mesh(chamGeo, oppChamMat);
oppCham.position.set(6, 1, 0);
scene.add(oppCham);

/* ============================
   入力（WASD）
============================ */
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

/* ============================
   状態変数
============================ */
let vx = 0;
let vy = 0;
const baseSpeed = 0.05;
const gravity = -0.01;
let onGround = true;
let lastColorChange = 0;

function getAbility(index) {
  return zoneColors[index].ability;
}

function getZoneAt(x) {
  if (x < -3) return 0;
  if (x < 3)  return 1;
  return 2;
}

/* ============================
   自分のカメレオン更新
============================ */
function updateMyChameleon() {

  const ability = getAbility(myColorIndex);
  const speed = ability === "speed" ? baseSpeed * 2 : baseSpeed;

  /* ---- WASD移動（左右反転修正済み） ---- */
  let moveX = 0;
  let moveZ = 0;

  if (keys["w"]) moveZ =  speed;   // 前進
  if (keys["s"]) moveZ = -speed;   // 後退
  if (keys["a"]) moveX = -speed;   // 左
  if (keys["d"]) moveX =  speed;   // 右

  const angle = camera.rotation.y;
  const sin = Math.sin(angle);
  const cos = Math.cos(angle);

  // 前後（W/S）
  myCham.position.x += moveZ * sin;
  myCham.position.z += moveZ * cos;

  // 左右（A/D）反転修正
  myCham.position.x -= moveX * cos;
  myCham.position.z += moveX * sin;

  /* ---- ジャンプ（青能力） ---- */
  if (ability === "speed" && keys["arrowup"] && onGround) {
    vy = 0.2;
    onGround = false;
  }

  /* ---- 色チェンジ ---- */
  if (keys[" "] && performance.now() - lastColorChange > 200) {
    myColorIndex = (myColorIndex + 1) % zoneColors.length;
    myChamMat.color.setHex(zoneColors[myColorIndex].color);
    lastColorChange = performance.now();
  }

  /* ---- 重力 ---- */
  vy += gravity;
  myCham.position.y += vy;

  if (myCham.position.y <= 1) {
    myCham.position.y = 1;
    vy = 0;
    onGround = true;
  }

  /* ---- ステルス ---- */
  const zoneIndex = getZoneAt(myCham.position.x);
  if (ability === "stealth" && zoneIndex === myColorIndex) {
    myChamMat.transparent = true;
    myChamMat.opacity = 0.3;
  } else {
    myChamMat.transparent = false;
    myChamMat.opacity = 1.0;
  }

  /* ---- 回転 ---- */
  myCham.rotation.y += 0.02;

  /* ---- オンライン同期 ---- */
  sendMessage({
    type: "state",
    x: myCham.position.x,
    y: myCham.position.y,
    z: myCham.position.z,
    colorIndex: myColorIndex
  });
}

/* ============================
   相手の状態反映
============================ */
function handleRemoteMessage(msg) {
  if (msg.type === "state") {
    oppCham.position.x = msg.x;
    oppCham.position.y = msg.y;
    oppCham.position.z = msg.z;
    oppChamMat.color.setHex(zoneColors[msg.colorIndex].color);
  }
}

/* ============================
   描画ループ（TPSカメラ追跡）
============================ */
function animate() {
  requestAnimationFrame(animate);

  updateMyChameleon();

  /* ---- TPSカメラ追跡 ---- */
  const camDistance = 8;
  const camHeight   = 4;

  const angle = camera.rotation.y;
  const offsetX = Math.sin(angle) * camDistance;
  const offsetZ = Math.cos(angle) * camDistance;

  camera.position.x += ((myCham.position.x - offsetX) - camera.position.x) * 0.1;
  camera.position.y += ((myCham.position.y + camHeight) - camera.position.y) * 0.1;
  camera.position.z += ((myCham.position.z - offsetZ) - camera.position.z) * 0.1;

  camera.lookAt(myCham.position);

  renderer.render(scene, camera);
}
animate();

/* ============================
   リサイズ対応
============================ */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
