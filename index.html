<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Chameleon 3D Paint Online</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; }

    #invite {
      position:fixed; top:10px; left:10px;
      background:#222; padding:10px; border-radius:8px;
    }

    #paintUI {
      position:fixed; top:10px; right:10px;
      background:#222; padding:10px; border-radius:8px;
      width:150px;
      display:none;
    }

    #paintUI input {
      width:100%;
    }
  </style>
</head>
<body>

<div id="invite" style="display:none;">
  <div>👇 このURLを友達に送ってね！</div>
  <div id="inviteURL" style="word-break:break-all; margin-top:5px;"></div>
  <button onclick="copyInvite()">コピー</button>
</div>

<div id="paintUI">
  <div>🎨 ペイントカラー</div>
  <input type="color" id="colorPicker" value="#5599ff">

  <div style="margin-top:10px;">🖌 ブラシサイズ</div>
  <input type="range" id="brushSize" min="5" max="50" value="10">
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>

let peer = null;
let conn = null;
let isHost = false;

const params = new URLSearchParams(location.search);
const roomId = params.get("room");

const inviteBox = document.getElementById("invite");
const inviteURL = document.getElementById("inviteURL");
const paintUI = document.getElementById("paintUI");

function copyInvite() {
  navigator.clipboard.writeText(inviteURL.innerText);
  alert("コピーしました！");
}

if (!roomId) {
  isHost = true;
  peer = new Peer();

  peer.on("open", id => {
    const url = `${location.origin}${location.pathname}?room=${id}`;
    inviteURL.innerText = url;
    inviteBox.style.display = "block";
    paintUI.style.display = "block";
  });

  peer.on("connection", c => {
    conn = c;
    setupConnection();
    inviteBox.style.display = "none";
  });

} else {
  isHost = false;
  peer = new Peer();

  peer.on("open", () => {
    conn = peer.connect(roomId);
    setupConnection();
    paintUI.style.display = "none";
  });
}

function setupConnection() {
  conn.on("data", msg => handleRemoteMessage(msg));
}

function sendState(msg) {
  if (conn && conn.open) conn.send(msg);
}

// ============================
// Three.js 基本セット
// ============================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 2000
);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ============================
// 💡 明るくするライト
// ============================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(20, 50, 20);
scene.add(light);

// ============================
// 床
// ============================
const obstacles = [];

const floor = new THREE.Mesh(
  new THREE.BoxGeometry(200, 1, 200),
  new THREE.MeshStandardMaterial({ color: 0x666666 })
);
floor.position.set(0, -0.5, 0);
scene.add(floor);
// ============================
// 🎨 6面ペイント用 CanvasTexture
// ============================
const canvasList = [];
const ctxList = [];
const textureList = [];

for (let i = 0; i < 6; i++) {
  const c = document.createElement("canvas");
  c.width = 512;
  c.height = 512;
  const cx = c.getContext("2d");
  cx.fillStyle = "#ffffff";
  cx.fillRect(0, 0, c.width, c.height);

  canvasList.push(c);
  ctxList.push(cx);
  textureList.push(new THREE.CanvasTexture(c));
}

// ============================
// プレイヤー（6面ペイント可能）
// ============================
const playerMaterials = textureList.map(tex => {
  return new THREE.MeshStandardMaterial({ map: tex });
});

const playerVisual = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 3),
  playerMaterials
);
scene.add(playerVisual);

const playerHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0xff0000, transparent:true, opacity:0.3 })
);
scene.add(playerHitbox);

if (isHost) {
  playerHitbox.position.set(0, 2, 0);
} else {
  playerHitbox.position.set(80, 2, 80);
}
playerVisual.position.copy(playerHitbox.position);

// ============================
// 相手プレイヤー（6面ペイント可能）
// ============================
const oppCanvasList = [];
const oppCtxList = [];
const oppTextureList = [];

for (let i = 0; i < 6; i++) {
  const c = document.createElement("canvas");
  c.width = 512;
  c.height = 512;
  const cx = c.getContext("2d");
  cx.fillStyle = "#ffffff";
  cx.fillRect(0, 0, c.width, c.height);

  oppCanvasList.push(c);
  oppCtxList.push(cx);
  oppTextureList.push(new THREE.CanvasTexture(c));
}

const oppMaterials = oppTextureList.map(tex => {
  return new THREE.MeshStandardMaterial({ map: tex });
});

const oppVisual = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 3),
  oppMaterials
);
scene.add(oppVisual);

const oppHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent:true, opacity:0.3 })
);
scene.add(oppHitbox);

// ============================
// 障害物（あなたのコードそのまま）
// ============================
function addWall(x, y, z, rotY) {
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(200, 40, 2),
    new THREE.MeshStandardMaterial({ color: 0x888888 })
  );
  wall.position.set(x, y, z);
  wall.rotation.y = rotY;
  scene.add(wall);
  obstacles.push(wall);
}

addWall(0, 20.5, -100, 0);
addWall(0, 20.5, 100, 0);
addWall(-100, 20.5, 0, Math.PI/2);
addWall(100, 20.5, 0, Math.PI/2);

// 車・イス・机・ブロックもそのまま
// ============================
// Raycaster（クリック判定）
// ============================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let painting = false;

window.addEventListener("mousedown", e => {
  if (!isHost) return;
  painting = true;
  paintAtMouse(e);
});

window.addEventListener("mousemove", e => {
  if (!painting || !isHost) return;
  paintAtMouse(e);
});

window.addEventListener("mouseup", () => {
  painting = false;
});

// ============================
// ペイント処理（面ごと）
// ============================
function paintAtMouse(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObject(playerVisual);
  if (hits.length > 0) {
    const uv = hits[0].uv;
    const face = hits[0].faceIndex;

    // BoxGeometry の面番号 → materialIndex
    const materialIndex = Math.floor(face / 2);

    const x = uv.x * canvasList[materialIndex].width;
    const y = (1 - uv.y) * canvasList[materialIndex].height;

    const color = document.getElementById("colorPicker").value;
    const brush = parseInt(document.getElementById("brushSize").value);

    const ctx = ctxList[materialIndex];
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, brush, 0, Math.PI * 2);
    ctx.fill();

    textureList[materialIndex].needsUpdate = true;

    // ---- オンライン同期 ----
    sendState({
      type: "paintDot",
      face: materialIndex,
      x, y, color, brush
    });
  }
}

// ============================
// ゲスト側：受信した点を描く
// ============================
function handleRemoteMessage(msg) {

  if (msg.type === "paintDot") {
    const ctx = oppCtxList[msg.face];
    ctx.fillStyle = msg.color;
    ctx.beginPath();
    ctx.arc(msg.x, msg.y, msg.brush, 0, Math.PI * 2);
    ctx.fill();
    oppTextureList[msg.face].needsUpdate = true;
  }

  if (msg.type === "state") {
    oppHitbox.position.set(msg.x, msg.y, msg.z);
    oppVisual.position.copy(oppHitbox.position);
  }
}

// ============================
// 当たり判定
// ============================
function isColliding(a, b) {
  a.geometry.computeBoundingBox();
  b.geometry.computeBoundingBox();

  const boxA = a.geometry.boundingBox.clone();
  const boxB = b.geometry.boundingBox.clone();

  boxA.min.add(a.position);
  boxA.max.add(a.position);

  boxB.min.add(b.position);
  boxB.max.add(b.position);

  return boxA.intersectsBox(boxB);
}

// ============================
// プレイヤー移動
// ============================
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

let vy = 0;
const speed = 0.3;
const gravity = -0.02;
let onGround = true;

function updatePlayer() {

  const oldX = playerHitbox.position.x;
  const oldY = playerHitbox.position.y;
  const oldZ = playerHitbox.position.z;

  let moveX = 0;
  let moveZ = 0;

  if (keys["w"]) moveZ =  speed;
  if (keys["s"]) moveZ = -speed;
  if (keys["a"]) moveX = -speed;
  if (keys["d"]) moveX =  speed;

  const angle = camera.rotation.y;
  const sin = Math.sin(angle);
  const cos = Math.cos(angle);

  playerHitbox.position.x += moveZ * sin;
  playerHitbox.position.z += moveZ * cos;

  playerHitbox.position.x -= moveX * cos;
  playerHitbox.position.z += moveX * sin;

  for (const obs of obstacles) {
    if (isColliding(playerHitbox, obs)) {
      const dx = playerHitbox.position.x - oldX;
      const dz = playerHitbox.position.z - oldZ;
      playerHitbox.position.x -= dx * 0.5;
      playerHitbox.position.z -= dz * 0.5;
      break;
    }
  }

  if (keys["arrowup"] && onGround) {
    vy = 0.35;
    onGround = false;
  }

  vy += gravity;
  playerHitbox.position.y += vy;

  if (playerHitbox.position.y <= 2) {
    playerHitbox.position.y = 2;
    vy = 0;
    onGround = true;
  }

  playerVisual.position.copy(playerHitbox.position);

  sendState({
    type: "state",
    x: playerHitbox.position.x,
    y: playerHitbox.position.y,
    z: playerHitbox.position.z
  });
}
// ============================
// TPSカメラ追跡
// ============================
function updateCamera() {
  const dist = 15;
  const height = 8;

  const angle = camera.rotation.y;
  const offsetX = Math.sin(angle) * dist;
  const offsetZ = Math.cos(angle) * dist;

  camera.position.x += ((playerHitbox.position.x - offsetX) - camera.position.x) * 0.1;
  camera.position.y += ((playerHitbox.position.y + height) - camera.position.y) * 0.1;
  camera.position.z += ((playerHitbox.position.z - offsetZ) - camera.position.z) * 0.1;

  camera.lookAt(playerHitbox.position);
}

// ============================
// 描画ループ
// ============================
function animate() {
  requestAnimationFrame(animate);

  updatePlayer();
  updateCamera();

  renderer.render(scene, camera);
}
animate();

// ============================
// リサイズ
// ============================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
