<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Three.js めっちゃカメレオン 3D</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; font-family:sans-serif; }
    #info { position:fixed; top:10px; left:10px; z-index:10; }
  </style>
</head>
<body>
<div id="info">
  ← → : 移動 / ↑ : ジャンプ / スペース : 色チェンジ
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
/* ============================
   Three.js 基本セット
============================ */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 4, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ============================
   ライト
============================ */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

/* ============================
   色ゾーン（床）
============================ */
const zoneColors = [
  { name:"赤",  color:0xff5555, ability:"attack" },
  { name:"緑",  color:0x55ff55, ability:"stealth" },
  { name:"青",  color:0x5599ff, ability:"speed" }
];

const zones = [];
for (let i = 0; i < 3; i++) {
  const geo = new THREE.BoxGeometry(6, 0.5, 20);
  const mat = new THREE.MeshStandardMaterial({
    color: zoneColors[i].color,
    transparent: true,
    opacity: 0.4
  });
  const zone = new THREE.Mesh(geo, mat);
  zone.position.set(i * 6 - 6, -0.25, 0);
  scene.add(zone);
  zones.push(zone);
}

/* ============================
   カメレオン（箱型）
============================ */
let colorIndex = 0;

const chamGeo = new THREE.BoxGeometry(1, 1, 2);
const chamMat = new THREE.MeshStandardMaterial({
  color: zoneColors[colorIndex].color
});
const chameleon = new THREE.Mesh(chamGeo, chamMat);
chameleon.position.set(-6, 1, 0);
scene.add(chameleon);

/* ============================
   状態変数
============================ */
let vx = 0;
let vy = 0;
const baseSpeed = 0.05;
const gravity = -0.01;
let onGround = true;
let lastColorChange = 0;

const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup",   e => keys[e.key] = false);
/* ============================
   能力判定
============================ */
function getAbility() {
  return zoneColors[colorIndex].ability;
}

/* ============================
   ゾーン判定
============================ */
function getZoneAt(x) {
  if (x < -3) return 0;   // 赤ゾーン
  if (x < 3)  return 1;   // 緑ゾーン
  return 2;               // 青ゾーン
}

/* ============================
   カメレオン更新
============================ */
function updateChameleon() {
  const ability = getAbility();
  const speed = ability === "speed" ? baseSpeed * 2 : baseSpeed;

  // 横移動
  if (keys["ArrowLeft"])      vx = -speed;
  else if (keys["ArrowRight"]) vx = speed;
  else                         vx = 0;

  // ジャンプ（青のときだけ）
  if (ability === "speed" && keys["ArrowUp"] && onGround) {
    vy = 0.2;
    onGround = false;
  }

  // 色チェンジ（スペース）
  if (keys[" "] && performance.now() - lastColorChange > 200) {
    colorIndex = (colorIndex + 1) % zoneColors.length;
    chamMat.color.setHex(zoneColors[colorIndex].color);
    lastColorChange = performance.now();
  }

  // 重力
  vy += gravity;

  // 位置更新
  chameleon.position.x += vx;
  chameleon.position.y += vy;

  // 地面判定
  if (chameleon.position.y <= 1) {
    chameleon.position.y = 1;
    vy = 0;
    onGround = true;
  }

  // ステルス（緑ゾーン＋緑色）
  const zoneIndex = getZoneAt(chameleon.position.x);
  if (ability === "stealth" && zoneIndex === colorIndex) {
    chamMat.transparent = true;
    chamMat.opacity = 0.3;
  } else {
    chamMat.transparent = false;
    chamMat.opacity = 1.0;
  }

  // 回転してそれっぽく
  chameleon.rotation.y += 0.02;
}
/* ============================
   描画
============================ */
function animate() {
  requestAnimationFrame(animate);
  updateChameleon();
  renderer.render(scene, camera);
}
animate();

/* ============================
   リサイズ対応
============================ */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
