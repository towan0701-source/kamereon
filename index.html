<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Chameleon 3D Online</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; }

    #invite {
      position:fixed; top:10px; left:10px;
      background:#222; padding:10px; border-radius:8px;
    }

    #paintUI {
      position:fixed; top:10px; right:10px;
      background:#222; padding:10px; border-radius:8px;
      width:150px;
      display:none; /* ← ゲストは非表示 */
    }

    #paintUI input {
      width:100%;
    }

    #paintPreview {
      width:100%; height:30px; margin-top:5px;
      background:#ffffff;
      border-radius:5px;
    }
  </style>
</head>
<body>

<!-- 招待URL -->
<div id="invite" style="display:none;">
  <div>👇 このURLを友達に送ってね！</div>
  <div id="inviteURL" style="word-break:break-all; margin-top:5px;"></div>
  <button onclick="copyInvite()">コピー</button>
</div>

<!-- 🎨 カラーパレットUI（ホストだけ表示） -->
<div id="paintUI">
  <div>🎨 カラーパレット</div>
  R <input type="range" id="rSlider" min="0" max="255" value="85">
  G <input type="range" id="gSlider" min="0" max="255" value="153">
  B <input type="range" id="bSlider" min="0" max="255" value="255">

  <div id="paintPreview"></div>

  <button onclick="applyColor()">決定</button>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>

// ============================
// PeerJS 接続
// ============================
let peer = null;
let conn = null;
let isHost = false;

const params = new URLSearchParams(location.search);
const roomId = params.get("room");

const inviteBox = document.getElementById("invite");
const inviteURL = document.getElementById("inviteURL");
const paintUI = document.getElementById("paintUI");

function copyInvite() {
  navigator.clipboard.writeText(inviteURL.innerText);
  alert("コピーしました！");
}

if (!roomId) {
  // ---- ホスト側 ----
  isHost = true;
  peer = new Peer();

  peer.on("open", id => {
    const url = `${location.origin}${location.pathname}?room=${id}`;
    inviteURL.innerText = url;
    inviteBox.style.display = "block";

    // ★ ホストはカラーパレットを表示
    paintUI.style.display = "block";
  });

  peer.on("connection", c => {
    conn = c;
    setupConnection();
    inviteBox.style.display = "none"; // 接続されたら消す
  });

} else {
  // ---- ゲスト側 ----
  isHost = false;
  peer = new Peer();

  peer.on("open", () => {
    conn = peer.connect(roomId);
    setupConnection();

    // ★ ゲストはカラーパレットを非表示
    paintUI.style.display = "none";
  });
}

function setupConnection() {
  conn.on("data", msg => handleRemoteMessage(msg));
}

function sendState(msg) {
  if (conn && conn.open) conn.send(msg);
}

// ============================
// Three.js 基本セット
// ============================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 2000
);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 50, 20);
scene.add(light);

// ============================
// 床
// ============================
const obstacles = [];

const floor = new THREE.Mesh(
  new THREE.BoxGeometry(200, 1, 200),
  new THREE.MeshStandardMaterial({ color: 0x444444 })
);
floor.position.set(0, -0.5, 0);
scene.add(floor);
// ============================
// 壁
// ============================
function addWall(x, y, z, rotY) {
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(200, 40, 2),
    new THREE.MeshStandardMaterial({ color: 0x666666 })
  );
  wall.position.set(x, y, z);
  wall.rotation.y = rotY;
  scene.add(wall);
  obstacles.push(wall);
}

addWall(0, 20.5, -100, 0);
addWall(0, 20.5, 100, 0);
addWall(-100, 20.5, 0, Math.PI/2);
addWall(100, 20.5, 0, Math.PI/2);

// ============================
// 車・イス・机・障害物
// ============================
function addCar(x, z) {
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(6, 2, 12),
    new THREE.MeshStandardMaterial({ color: 0x2222aa })
  );
  body.position.set(x, 1, z);
  scene.add(body);
  obstacles.push(body);

  const top = new THREE.Mesh(
    new THREE.BoxGeometry(4, 2, 6),
    new THREE.MeshStandardMaterial({ color: 0x4444ff })
  );
  top.position.set(x, 3, z);
  scene.add(top);
  obstacles.push(top);
}

addCar(20, 20);
addCar(-30, -10);

function addChair(x, z) {
  const seat = new THREE.Mesh(
    new THREE.BoxGeometry(2, 0.5, 2),
    new THREE.MeshStandardMaterial({ color: 0x885522 })
  );
  seat.position.set(x, 1, z);
  scene.add(seat);
  obstacles.push(seat);

  const back = new THREE.Mesh(
    new THREE.BoxGeometry(2, 3, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x553311 })
  );
  back.position.set(x, 2.5, z - 1);
  scene.add(back);
  obstacles.push(back);
}

addChair(10, 5);
addChair(-15, 25);

function addDesk(x, z) {
  const top = new THREE.Mesh(
    new THREE.BoxGeometry(8, 1, 4),
    new THREE.MeshStandardMaterial({ color: 0x996633 })
  );
  top.position.set(x, 3, z);
  scene.add(top);
  obstacles.push(top);

  const legGeo = new THREE.BoxGeometry(1, 3, 1);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x664422 });

  const offsets = [
    [-3, -1], [3, -1], [-3, 1], [3, 1]
  ];

  offsets.forEach(o => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(x + o[0], 1.5, z + o[1]);
    scene.add(leg);
    obstacles.push(leg);
  });
}

addDesk(-10, 15);
addDesk(25, -20);

function addBlock(x, z, w, h, d, color) {
  const block = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color })
  );
  block.position.set(x, h/2, z);
  scene.add(block);
  obstacles.push(block);
}

addBlock(0, 30, 10, 10, 10, 0xaa3333);
addBlock(40, 0, 20, 5, 20, 0x3333aa);

// ============================
// プレイヤー（青＋赤）
// ============================
const playerVisual = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 3),
  new THREE.MeshStandardMaterial({ color: 0x5599ff })
);
scene.add(playerVisual);

const playerHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0xff0000, transparent:true, opacity:0.3 })
);
scene.add(playerHitbox);

// ---- 初期リスポーン地点 ----
if (isHost) {
  playerHitbox.position.set(0, 2, 0);     // ホストは中央
} else {
  playerHitbox.position.set(80, 2, 80);   // ゲストは遠く
}
playerVisual.position.copy(playerHitbox.position);

// ============================
// 相手プレイヤー（青＋赤）
// ============================
const oppVisual = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 3),
  new THREE.MeshStandardMaterial({ color: 0x55ff55 })
);
scene.add(oppVisual);

const oppHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent:true, opacity:0.3 })
);
scene.add(oppHitbox);
// ============================
// AABB当たり判定
// ============================
function isColliding(a, b) {
  a.geometry.computeBoundingBox();
  b.geometry.computeBoundingBox();

  const boxA = a.geometry.boundingBox.clone();
  const boxB = b.geometry.boundingBox.clone();

  boxA.min.add(a.position);
  boxA.max.add(a.position);

  boxB.min.add(b.position);
  boxB.max.add(b.position);

  return boxA.intersectsBox(boxB);
}

// ============================
// プレイヤー更新
// ============================
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

let vy = 0;
const speed = 0.3;
const gravity = -0.02;
let onGround = true;

function updatePlayer() {

  const oldX = playerHitbox.position.x;
  const oldY = playerHitbox.position.y;
  const oldZ = playerHitbox.position.z;

  let moveX = 0;
  let moveZ = 0;

  if (keys["w"]) moveZ =  speed;
  if (keys["s"]) moveZ = -speed;
  if (keys["a"]) moveX = -speed;
  if (keys["d"]) moveX =  speed;

  const angle = camera.rotation.y;
  const sin = Math.sin(angle);
  const cos = Math.cos(angle);

  playerHitbox.position.x += moveZ * sin;
  playerHitbox.position.z += moveZ * cos;

  playerHitbox.position.x -= moveX * cos;
  playerHitbox.position.z += moveX * sin;

  // ---- 押し戻し式の当たり判定 ----
  for (const obs of obstacles) {
    if (isColliding(playerHitbox, obs)) {
      const dx = playerHitbox.position.x - oldX;
      const dz = playerHitbox.position.z - oldZ;
      playerHitbox.position.x -= dx * 0.5;
      playerHitbox.position.z -= dz * 0.5;
      break;
    }
  }

  // ---- ジャンプ ----
  if (keys["arrowup"] && onGround) {
    vy = 0.35;
    onGround = false;
  }

  vy += gravity;
  playerHitbox.position.y += vy;

  if (playerHitbox.position.y <= 2) {
    playerHitbox.position.y = 2;
    vy = 0;
    onGround = true;
  }

  // 青い見た目を赤い当たり判定に追従
  playerVisual.position.copy(playerHitbox.position);

  // ---- オンライン同期 ----
  sendState({
    type: "state",
    x: playerHitbox.position.x,
    y: playerHitbox.position.y,
    z: playerHitbox.position.z,
    color: playerVisual.material.color.getHex()
  });
}

// ============================
// 🎨 カラーパレット処理（ホストのみ）
// ============================
const rSlider = document.getElementById("rSlider");
const gSlider = document.getElementById("gSlider");
const bSlider = document.getElementById("bSlider");
const paintPreview = document.getElementById("paintPreview");

function updatePreview() {
  const r = rSlider.value;
  const g = gSlider.value;
  const b = bSlider.value;
  paintPreview.style.background = `rgb(${r},${g},${b})`;
}

rSlider.oninput = updatePreview;
gSlider.oninput = updatePreview;
bSlider.oninput = updatePreview;

updatePreview();

// 色を適用（ホストのみ）
function applyColor() {
  if (!isHost) return; // ★ ゲストは色変更不可

  const r = parseInt(rSlider.value);
  const g = parseInt(gSlider.value);
  const b = parseInt(bSlider.value);

  const hex = (r << 16) | (g << 8) | b;

  playerVisual.material.color.setHex(hex);

  sendState({
    type: "paint",
    color: hex
  });
}

// ============================
// 相手プレイヤー反映
// ============================
function handleRemoteMessage(msg) {

  if (msg.type === "state") {
    oppHitbox.position.set(msg.x, msg.y, msg.z);
    oppVisual.position.copy(oppHitbox.position);
    oppVisual.material.color.setHex(msg.color);
  }

  if (msg.type === "paint") {
    oppVisual.material.color.setHex(msg.color);
  }
}
// ============================
// TPSカメラ追跡
// ============================
function updateCamera() {
  const dist = 15;
  const height = 8;

  const angle = camera.rotation.y;
  const offsetX = Math.sin(angle) * dist;
  const offsetZ = Math.cos(angle) * dist;

  camera.position.x += ((playerHitbox.position.x - offsetX) - camera.position.x) * 0.1;
  camera.position.y += ((playerHitbox.position.y + height) - camera.position.y) * 0.1;
  camera.position.z += ((playerHitbox.position.z - offsetZ) - camera.position.z) * 0.1;

  camera.lookAt(playerHitbox.position);
}

// ============================
// 描画ループ
// ============================
function animate() {
  requestAnimationFrame(animate);

  updatePlayer();
  updateCamera();

  renderer.render(scene, camera);
}
animate();

// ============================
// リサイズ
// ============================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
