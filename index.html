<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Chameleon 3D Paint Online</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; }

    #invite {
      position:fixed; top:10px; left:10px;
      background:#222; padding:10px; border-radius:8px;
    }

    #paintUI {
      position:fixed; top:10px; right:10px;
      background:#222; padding:10px; border-radius:8px;
      width:150px;
      display:none;
    }

    #paintUI input { width:100%; }

    #crosshair {
      position:fixed;
      top:50%;
      left:50%;
      width:20px;
      height:20px;
      transform:translate(-50%, -50%);
      pointer-events:none;
      display:none;
    }
    #crosshair:before, #crosshair:after {
      content:"";
      position:absolute;
      background:#ff0000;
    }
    #crosshair:before { left:9px; top:0; width:2px; height:20px; }
    #crosshair:after { top:9px; left:0; width:20px; height:2px; }

    #resultBox {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:#000a;
      padding:20px;
      border-radius:10px;
      font-size:30px;
      display:none;
    }
  </style>
</head>
<body>

<div id="invite" style="display:none;">
  <div>👇 このURLを友達に送ってね！</div>
  <div id="inviteURL" style="word-break:break-all; margin-top:5px;"></div>
  <button onclick="copyInvite()">コピー</button>
</div>

<div id="paintUI">
  <div>🎨 ペイントカラー</div>
  <input type="color" id="colorPicker" value="#5599ff">
  <div style="margin-top:10px;">🖌 ブラシサイズ</div>
  <input type="range" id="brushSize" min="5" max="50" value="10">
</div>

<div id="crosshair"></div>
<div id="resultBox"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let peer = null;
let conn = null;
let isHost = false;

const params = new URLSearchParams(location.search);
const roomId = params.get("room");

const inviteBox = document.getElementById("invite");
const inviteURL = document.getElementById("inviteURL");
const paintUI = document.getElementById("paintUI");
const crosshair = document.getElementById("crosshair");
const resultBox = document.getElementById("resultBox");

function copyInvite() {
  navigator.clipboard.writeText(inviteURL.innerText);
  alert("コピーしました！");
}

if (!roomId) {
  isHost = true;
  peer = new Peer();
  peer.on("open", id => {
    const url = `${location.origin}${location.pathname}?room=${id}`;
    inviteURL.innerText = url;
    inviteBox.style.display = "block";
    paintUI.style.display = "block";
  });
  peer.on("connection", c => {
    conn = c;
    setupConnection();
    inviteBox.style.display = "none";
  });
} else {
  isHost = false;
  peer = new Peer();
  peer.on("open", () => {
    conn = peer.connect(roomId);
    setupConnection();
    crosshair.style.display = "block";
    paintUI.style.display = "none";
  });
}

function setupConnection() {
  conn.on("data", msg => handleRemoteMessage(msg));
}

function sendState(msg) {
  if (conn && conn.open) conn.send(msg);
}

// Three.js 基本セット
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 2000
);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ライト
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(20, 50, 20);
scene.add(light);

// 床
const floor = new THREE.Mesh(
  new THREE.BoxGeometry(200, 1, 200),
  new THREE.MeshStandardMaterial({ color: 0x666666 })
);
floor.position.set(0, -0.5, 0);
scene.add(floor);

// TPSカメラ距離（A）
const TPS_DISTANCE = 15;
const TPS_HEIGHT = 8;

// 視点用 yaw/pitch
let yaw = 0;
let pitch = 0;

let isPaintingMode = false;
let pointerLocked = false;

const mouseLookSensitivity = 0.002;

document.addEventListener("pointerlockchange", () => {
  pointerLocked = (document.pointerLockElement === document.body);
});
// 自分の6面ペイント
const myCanvasList = [];
const myCtxList = [];
const myTextureList = [];
for (let i = 0; i < 6; i++) {
  const c = document.createElement("canvas");
  c.width = 512;
  c.height = 512;
  const cx = c.getContext("2d");
  cx.fillStyle = "#ffffff";
  cx.fillRect(0, 0, c.width, c.height);
  myCanvasList.push(c);
  myCtxList.push(cx);
  myTextureList.push(new THREE.CanvasTexture(c));
}
const myMaterials = myTextureList.map(tex => new THREE.MeshStandardMaterial({ map: tex }));
const myVisual = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 3), myMaterials);
scene.add(myVisual);

const myHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0xff0000, transparent:true, opacity:0.3 })
);
scene.add(myHitbox);

// 初期位置
if (isHost) {
  myHitbox.position.set(0, 2, 0);
} else {
  myHitbox.position.set(20, 2, 20);
}
myVisual.position.copy(myHitbox.position);

// 相手プレイヤー
const oppCanvasList = [];
const oppCtxList = [];
const oppTextureList = [];
for (let i = 0; i < 6; i++) {
  const c = document.createElement("canvas");
  c.width = 512;
  c.height = 512;
  const cx = c.getContext("2d");
  cx.fillStyle = "#ffffff";
  cx.fillRect(0, 0, c.width, c.height);
  oppCanvasList.push(c);
  oppCtxList.push(cx);
  oppTextureList.push(new THREE.CanvasTexture(c));
}
const oppMaterials = oppTextureList.map(tex => new THREE.MeshStandardMaterial({ map: tex }));
const oppVisual = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 3), oppMaterials);
scene.add(oppVisual);

const oppHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent:true, opacity:0.3 })
);
scene.add(oppHitbox);
// クリック処理
window.addEventListener("mousedown", e => {
  if (isHost) {
    if (!pointerLocked && !isPaintingMode && e.button === 0) {
      document.body.requestPointerLock();
    }
    if (isPaintingMode && e.button === 0) {
      painting = true;
      paintAtMouse(e);
    }
    return;
  }

  // ゲスト
  if (!pointerLocked && e.button === 0) {
    document.body.requestPointerLock();
    return;
  }
  if (pointerLocked && e.button === 0) {
    shootLaser();
  }
});

// マウス移動
window.addEventListener("mousemove", e => {
  if (pointerLocked && !isPaintingMode) {
    yaw -= e.movementX * mouseLookSensitivity;

    if (!isHost) {
      pitch -= e.movementY * mouseLookSensitivity;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));
    }
  }

  if (painting && isHost && isPaintingMode) {
    paintAtMouse(e);
  }
});

window.addEventListener("mouseup", () => painting = false);

// キー入力
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  if (isHost && e.key.toLowerCase() === "f") {
    isPaintingMode = !isPaintingMode;
    if (isPaintingMode) {
      if (pointerLocked) document.exitPointerLock();
    } else {
      document.body.requestPointerLock();
    }
  }
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 移動（ゲスト反転）
let vy = 0;
const speed = 0.3;
const gravity = -0.02;
let onGround = true;

function updatePlayer() {
  let moveForward = 0;
  let moveSide = 0;

  if (keys["w"]) moveForward =  speed;
  if (keys["s"]) moveForward = -speed;
  if (keys["a"]) moveSide    = -speed;
  if (keys["d"]) moveSide    =  speed;

  // ⭐ ゲストだけ移動反転
  if (!isHost) {
    moveForward = -moveForward;
    moveSide    = -moveSide;
  }

  const dirX = Math.sin(yaw);
  const dirZ = Math.cos(yaw);

  // 前後
  myHitbox.position.x += dirX * moveForward;
  myHitbox.position.z += dirZ * moveForward;

  // 左右
  myHitbox.position.x += -dirZ * moveSide;
  myHitbox.position.z +=  dirX * moveSide;

  // ジャンプ
  if (keys["arrowup"] && onGround) {
    vy = 0.35;
    onGround = false;
  }
  vy += gravity;
  myHitbox.position.y += vy;
  if (myHitbox.position.y <= 2) {
    myHitbox.position.y = 2;
    vy = 0;
    onGround = true;
  }

  myVisual.position.copy(myHitbox.position);

  sendState({
    type: isHost ? "hostMove" : "guestMove",
    x: myHitbox.position.x,
    y: myHitbox.position.y,
    z: myHitbox.position.z
  });
}

function handleRemoteMessage(msg) {
  if (msg.type === "hostMove" && !isHost) {
    oppHitbox.position.set(msg.x, msg.y, msg.z);
    oppVisual.position.copy(oppHitbox.position);
  }
  if (msg.type === "guestMove" && isHost) {
    oppHitbox.position.set(msg.x, msg.y, msg.z);
    oppVisual.position.copy(oppHitbox.position);
  }
  if (msg.type === "paintDot") {
    const ctx = oppCtxList[msg.face];
    ctx.fillStyle = msg.color;
    ctx.beginPath();
    ctx.arc(msg.x, msg.y, msg.brush, 0, Math.PI * 2);
    ctx.fill();
    oppTextureList[msg.face].needsUpdate = true;
  }
  if (msg.type === "win") {
    resultBox.innerText = "💥 撃たれました… ホストの負け";
    resultBox.style.display = "block";
  }
}
function updateCamera() {
  if (isHost) {
    // ⭐ ホスト：TPS視点（真後ろ固定）
    const offsetX = Math.sin(yaw) * TPS_DISTANCE;
    const offsetZ = Math.cos(yaw) * TPS_DISTANCE;

    camera.position.set(
      myHitbox.position.x - offsetX,
      myHitbox.position.y + TPS_HEIGHT,
      myHitbox.position.z - offsetZ
    );

    camera.lookAt(myHitbox.position);

  } else {
    // ⭐ ゲスト：FPS視点（上下左右）
    const headHeight = 3;

    camera.position.set(
      myHitbox.position.x,
      myHitbox.position.y + headHeight,
      myHitbox.position.z
    );

    camera.rotation.set(pitch, yaw, 0);
  }
}

function animate() {
  requestAnimationFrame(animate);
  updatePlayer();
  updateCamera();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
