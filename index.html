<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>復元パッチテンプレート</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  body { margin:0; overflow:hidden; background:#111; color:#fff; font-family:system-ui; }
  #ui { position:fixed; top:8px; left:8px; background:#222; padding:8px; border-radius:6px; z-index:10; }
  #cross { position:fixed; left:50%; top:50%; width:18px; height:18px; transform:translate(-50%,-50%); pointer-events:none; display:none; }
  #cross:before,#cross:after{content:"";position:absolute;background:#f44;}
  #cross:before{left:8px;top:0;width:2px;height:18px;} #cross:after{top:8px;left:0;width:18px;height:2px;}
  button,input { margin:4px 0; display:block; width:100%; }
</style>
</head>
<body>
<div id="ui">
  <button id="togglePaint">Toggle Paint (F)</button>
  <input id="color" type="color" value="#5599ff">
  <input id="brush" type="range" min="4" max="48" value="12">
  <div id="status" style="font-size:12px;margin-top:6px;color:#ccc">status: ready</div>
</div>
<div id="cross"></div>

<script type="module">
/* -------------------------
   Three.js をモジュールで読み込む（r150+ 対応）
   既存コードがグローバル THREE を参照している場合に備え window.THREE にも設定
   ------------------------- */
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
window.THREE = THREE;

/* -------------------------
   基本セットアップ
   ------------------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ライトと床 */
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 1.2); dir.position.set(20,40,20); scene.add(dir);
const floor = new THREE.Mesh(new THREE.BoxGeometry(200,1,200), new THREE.MeshStandardMaterial({color:0x666666}));
floor.position.y = -0.5; scene.add(floor);

/* -------------------------
   プレイヤーとビジュアル
   ------------------------- */
const myHitbox = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), new THREE.MeshStandardMaterial({color:0xff0000, transparent:true, opacity:0.3}));
scene.add(myHitbox);
myHitbox.position.set(0,2,0);

const myVisual = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,3), new THREE.MeshStandardMaterial({color:0x9999ff}));
scene.add(myVisual);
myVisual.position.copy(myHitbox.position);

/* -------------------------
   カメラ制御パラメータ
   ------------------------- */
let yaw = 0, pitch = 0;
const TPS_DISTANCE = 15, TPS_HEIGHT = 8;
let isHost = true; // 実運用では room 判定で切り替える
let isPaintingMode = false;
let pointerLocked = false;
let painting = false;
let brushSize = 12;
let brushColor = "#5599ff";

/* UI hookup */
const toggleBtn = document.getElementById("togglePaint");
const colorInput = document.getElementById("color");
const brushInput = document.getElementById("brush");
const cross = document.getElementById("cross");
const status = document.getElementById("status");
toggleBtn.onclick = () => { isPaintingMode = !isPaintingMode; updatePointerLockState(); updateUI(); };
colorInput.oninput = e => brushColor = e.target.value;
brushInput.oninput = e => brushSize = Number(e.target.value);
function updateUI(){ cross.style.display = (!isHost && !isPaintingMode) ? "block" : "none"; status.innerText = `status: ${isHost ? "host" : "guest"} ${isPaintingMode ? "paint" : "play"}`; }

/* pointer lock handling */
document.addEventListener("pointerlockchange", () => {
  pointerLocked = (document.pointerLockElement === document.body);
  // ホストのペイント中は pointerlock を強制解除しておく
  if (isHost && isPaintingMode && pointerLocked) document.exitPointerLock();
});
function updatePointerLockState(){
  if (isHost) {
    if (isPaintingMode) {
      if (pointerLocked) document.exitPointerLock();
    } else {
      document.body.requestPointerLock();
    }
  } else {
    if (!pointerLocked) document.body.requestPointerLock();
  }
}

/* -------------------------
   入力（最小）と移動
   ------------------------- */
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === "f") {
    isPaintingMode = !isPaintingMode;
    updatePointerLockState();
    updateUI();
  }
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

const mouseLookSensitivity = 0.002;
window.addEventListener("mousemove", e => {
  if (pointerLocked && !isPaintingMode) {
    yaw -= e.movementX * mouseLookSensitivity;
    if (!isHost) {
      pitch -= e.movementY * mouseLookSensitivity;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));
    }
  }
  if (painting && isHost && isPaintingMode) paintAtMouse(e);
});

window.addEventListener("mousedown", e => {
  if (isHost) {
    // ペイントモード優先
    if (isPaintingMode && e.button === 0) { painting = true; paintAtMouse(e); }
    return;
  }
  // ゲスト側
  if (!pointerLocked && e.button === 0) {
    document.body.requestPointerLock();
    return;
  }
  if (pointerLocked && e.button === 0) {
    shootLaser();
  }
});
window.addEventListener("mouseup", () => painting = false);

/* ホストのペイント中だけホイールでズーム */
window.addEventListener("wheel", e => {
  if (isHost && isPaintingMode) {
    camera.position.z += e.deltaY * 0.05;
  }
});

/* -------------------------
   ペイント実装（簡易）
   - 床に貼った大きなキャンバスに描く方式
   ------------------------- */
const paintCanvas = document.createElement("canvas");
paintCanvas.width = paintCanvas.height = 1024;
const paintCtx = paintCanvas.getContext("2d");
paintCtx.fillStyle = "#ffffff"; paintCtx.fillRect(0,0,paintCanvas.width,paintCanvas.height);
const paintTex = new THREE.CanvasTexture(paintCanvas);
const paintPlane = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshBasicMaterial({map:paintTex, side:THREE.DoubleSide}));
paintPlane.rotation.x = -Math.PI/2; paintPlane.position.y = 0.01; scene.add(paintPlane);

function paintAtMouse(e){
  try {
    if (!paintCtx || !renderer) return;
    const rect = renderer.domElement.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(x,y), camera);
    const hits = ray.intersectObject(paintPlane, true);
    if (hits.length === 0) return;
    const uv = hits[0].uv;
    if (!uv) return;
    const px = Math.floor(uv.x * paintCanvas.width);
    const py = Math.floor((1 - uv.y) * paintCanvas.height);
    paintCtx.fillStyle = brushColor;
    paintCtx.beginPath();
    paintCtx.arc(px, py, brushSize, 0, Math.PI*2);
    paintCtx.fill();
    paintTex.needsUpdate = true;
    // 必要ならここでネットワーク送信（paintDot）を行う
  } catch (err) {
    console.error("paintAtMouse error:", err);
  }
}

/* -------------------------
   簡易移動（ホスト/ゲストで反転）
   ------------------------- */
let vy = 0, onGround = true;
function updatePlayer(){
  let moveF = 0, moveS = 0;
  const speed = 0.3;
  if (keys["w"]) moveF = speed;
  if (keys["s"]) moveF = -speed;
  if (keys["a"]) moveS = -speed;
  if (keys["d"]) moveS = speed;
  if (!isHost) { moveF = -moveF; moveS = -moveS; }
  const dirX = Math.sin(yaw), dirZ = Math.cos(yaw);
  myHitbox.position.x += dirX * moveF + -dirZ * moveS;
  myHitbox.position.z += dirZ * moveF + dirX * moveS;
  if (keys[" " ] && onGround) { vy = 0.35; onGround = false; }
  vy += -0.02;
  myHitbox.position.y += vy;
  if (myHitbox.position.y <= 2) { myHitbox.position.y = 2; vy = 0; onGround = true; }
  myVisual.position.copy(myHitbox.position);
}

/* -------------------------
   カメラ更新（安全チェックあり）
   - 重要: rotation を直接 set する箇所を排除し lookAt を使う
   ------------------------- */
function updateCamera(){
  if (!myHitbox) return;
  if (isHost){
    const offsetX = Math.sin(yaw) * TPS_DISTANCE;
    const offsetZ = Math.cos(yaw) * TPS_DISTANCE;
    camera.position.set(myHitbox.position.x - offsetX, myHitbox.position.y + TPS_HEIGHT, myHitbox.position.z - offsetZ);
    if (camera.position.y < 1) camera.position.y = 1;
    camera.lookAt(myHitbox.position);
  } else {
    camera.position.set(myHitbox.position.x, myHitbox.position.y + 3, myHitbox.position.z);
    camera.rotation.set(pitch, yaw, 0);
  }
}

/* -------------------------
   animate を try/catch で保護
   ------------------------- */
function animate(){
  try {
    requestAnimationFrame(animate);
    updatePlayer();
    updateCamera();
    renderer.render(scene, camera);
  } catch (err) {
    console.error("animate error:", err);
    // エラーが出てもループを止めない（デバッグ用）
  }
}
animate();

/* -------------------------
   デバッグ用の簡易関数
   ------------------------- */
function shootLaser(){ console.log("shoot"); }
updateUI();

</script>
</body>
</html>
