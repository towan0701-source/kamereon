<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Chameleon Online - Host Paint 6-face UV</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  body { margin:0; overflow:hidden; background:#111; color:#fff; font-family:system-ui; }
  #invite { position:fixed; top:10px; left:10px; background:#222; padding:10px; border-radius:8px; z-index:20; width:320px; display:none; }
  #inviteURL { word-break:break-all; margin-top:6px; font-size:13px; color:#ddd; }
  #copyInviteBtn { margin-top:8px; width:100%; }
  #paintUI { position:fixed; top:10px; right:10px; background:#222; padding:10px; border-radius:8px; z-index:20; width:200px; display:none; }
  #paintUI input[type="range"] { width:100%; }
  #cross { position:fixed; left:50%; top:50%; width:18px; height:18px; transform:translate(-50%,-50%); pointer-events:none; display:none; z-index:20; }
  #cross:before,#cross:after{content:"";position:absolute;background:#f44;}
  #cross:before{left:8px;top:0;width:2px;height:18px;} #cross:after{top:8px;left:0;width:18px;height:2px;}
  #status { position:fixed; bottom:10px; left:10px; background:#0008; padding:8px; border-radius:6px; font-size:13px; z-index:20; }
  button,input { font-size:14px; }
</style>
</head>
<body>

<!-- Invite UI -->
<div id="invite" style="display:none;">
  <div>👇 このURLを友達に送ってね！</div>
  <div id="inviteURL"></div>
  <button id="copyInviteBtn">コピー</button>
</div>

<!-- Paint UI (ホストのみ表示) -->
<div id="paintUI" style="display:none;">
  <div>🎨 ペイントカラー</div>
  <input id="colorPicker" type="color" value="#5599ff">
  <div style="margin-top:8px;">🖌 ブラシサイズ</div>
  <input id="brushSize" type="range" min="4" max="256" value="36">
  <div style="font-size:12px;margin-top:6px;color:#ccc">ホストのみペイント可能（6面UV）</div>
</div>

<div id="cross"></div>
<div id="status">status: init</div>

<!-- PeerJS UMD -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<!-- Main app as module (Three.js as module) -->
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
window.THREE = THREE; // 既存コード互換のため

/* -------------------------
   DOM
   ------------------------- */
const inviteBox = document.getElementById("invite");
const inviteURL = document.getElementById("inviteURL");
const copyInviteBtn = document.getElementById("copyInviteBtn");
const paintUI = document.getElementById("paintUI");
const colorPicker = document.getElementById("colorPicker");
const brushSizeInput = document.getElementById("brushSize");
const cross = document.getElementById("cross");
const statusBox = document.getElementById("status");

/* -------------------------
   Peer / Room handling
   ------------------------- */
const params = new URLSearchParams(location.search);
const roomId = params.get("room");

let peer = null;
let conn = null;
let isHost = false;

function showInvite(url) {
  inviteURL.innerText = url;
  inviteBox.style.display = "block";
}
function hideInvite() {
  inviteBox.style.display = "none";
}

copyInviteBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(inviteURL.innerText);
    copyInviteBtn.innerText = "コピーしました";
    setTimeout(() => copyInviteBtn.innerText = "コピー", 1500);
  } catch (err) {
    console.error("コピー失敗", err);
    alert("クリップボードにコピーできませんでした。手動でコピーしてください。");
  }
});

function setupConnectionHandlers(connection) {
  if (!connection) return;
  connection.on("open", () => {
    console.log("P2P connection open");
    conn = connection;
    if (isHost) hideInvite();
    updateStatus("connected");
    sendState({ type: "hello", role: isHost ? "host" : "guest" });
  });
  connection.on("data", data => {
    handleRemoteMessage(data);
  });
  connection.on("close", () => {
    console.log("P2P connection closed");
    conn = null;
    updateStatus("disconnected");
    if (isHost) {
      setTimeout(() => { if (inviteURL.innerText) inviteBox.style.display = "block"; }, 500);
    }
  });
  connection.on("error", err => {
    console.error("connection error:", err);
    updateStatus("conn error");
    if (isHost) inviteBox.style.display = "block";
  });
}

function initPeer() {
  peer = new Peer();
  peer.on("open", id => {
    if (!roomId) {
      isHost = true;
      const url = `${location.origin}${location.pathname}?room=${id}`;
      showInvite(url);
      paintUI.style.display = "block";
      updateStatus("host waiting");
    } else {
      isHost = false;
      const c = peer.connect(roomId);
      setupConnectionHandlers(c);
      hideInvite();
      paintUI.style.display = "none";
      cross.style.display = "block";
      updateStatus("guest connecting");
    }
  });
  peer.on("connection", c => {
    setupConnectionHandlers(c);
  });
  peer.on("error", err => {
    console.error("peer error:", err);
    updateStatus("peer error");
  });
}

function sendState(msg) {
  if (conn && conn.open) conn.send(msg);
}

function handleRemoteMessage(msg) {
  // ここに既存の同期処理を入れる（例: paint 同期など）
  console.log("remote:", msg);
}

/* -------------------------
   Three.js scene setup
   ------------------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* lights and floor */
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(20, 40, 20);
scene.add(dirLight);

const floor = new THREE.Mesh(
  new THREE.BoxGeometry(200, 1, 200),
  new THREE.MeshStandardMaterial({ color: 0x666666 })
);
floor.position.y = -0.5;
scene.add(floor);

/* -------------------------
   Player objects (host's chameleon = myVisual)
   ------------------------- */
const myHitbox = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.6, 0.6),
  new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.3 })
);
scene.add(myHitbox);
myHitbox.position.set(0, 2, 0);

/* -------------------------
   Chameleon canvas + texture (高解像度)
   ------------------------- */
// キャンバス解像度を上げる
const chameleonCanvas = document.createElement("canvas");
chameleonCanvas.width = chameleonCanvas.height = 2048;
const chameleonCtx = chameleonCanvas.getContext("2d");
// 初期ベースカラー
chameleonCtx.fillStyle = "#9999ff";
chameleonCtx.fillRect(0, 0, chameleonCanvas.width, chameleonCanvas.height);
const chameleonTex = new THREE.CanvasTexture(chameleonCanvas);
chameleonTex.flipY = false;

/* -------------------------
   BoxGeometry を 3x2 グリッド UV に割り当てる
   ------------------------- */
function createBoxWithGridUV(width, height, depth, cols = 3, rows = 2) {
  const geo = new THREE.BoxGeometry(width, height, depth);
  const uvAttr = geo.attributes.uv;
  const uv = uvAttr.array; // Float32Array length = 48 (24 * 2)

  const cellW = 1 / cols;
  const cellH = 1 / rows;

  // faceCell の割り当て（face index -> cell col,row）
  const faceCell = [
    [0, 0], // face 0
    [1, 0], // face 1
    [2, 0], // face 2
    [0, 1], // face 3
    [1, 1], // face 4
    [2, 1]  // face 5
  ];

  for (let face = 0; face < 6; face++) {
    const [col, row] = faceCell[face];
    const u0 = col * cellW;
    const v0 = 1 - (row + 1) * cellH;
    const u1 = u0 + cellW;
    const v1 = v0 + cellH;
    const base = face * 8;
    // 頂点順に合わせて割り当て（BoxGeometry の標準順）
    uv[base + 0] = u1; uv[base + 1] = v1;
    uv[base + 2] = u0; uv[base + 3] = v1;
    uv[base + 4] = u0; uv[base + 5] = v0;
    uv[base + 6] = u1; uv[base + 7] = v0;
  }

  uvAttr.needsUpdate = true;
  return geo;
}

const boxGeo = createBoxWithGridUV(1.5, 1.5, 3, 3, 2);
const myVisual = new THREE.Mesh(
  boxGeo,
  new THREE.MeshStandardMaterial({ map: chameleonTex, color: 0xffffff })
);
scene.add(myVisual);
myVisual.position.copy(myHitbox.position);

/* -------------------------
   Camera and control params
   ------------------------- */
let yaw = 0, pitch = 0;
const TPS_DISTANCE = 15, TPS_HEIGHT = 8;
let isPaintingMode = false;
let pointerLocked = false;
let painting = false;
// ブラシ初期値を大きめに
let brushSize = 36;
let brushColor = colorPicker.value;

/* UI bindings */
colorPicker.addEventListener("input", e => brushColor = e.target.value);
brushSizeInput.addEventListener("input", e => {
  brushSize = Number(e.target.value);
});

/* -------------------------
   Utility: update status / UI
   ------------------------- */
function updateStatus(text) {
  statusBox.innerText = `status: ${text}`;
}

function updateUI() {
  paintUI.style.display = (isHost ? "block" : "none");
  cross.style.display = (!isHost && !isPaintingMode) ? "block" : "none";
  updateStatus(isHost ? (isPaintingMode ? "host paint" : "host play") : "guest play");
}

/* pointer lock handling */
document.addEventListener("pointerlockchange", () => {
  pointerLocked = (document.pointerLockElement === document.body);
  if (isHost && isPaintingMode && pointerLocked) document.exitPointerLock();
});

/* -------------------------
   Input handling (Fキーはホストのみ)
   ------------------------- */
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === "f") {
    if (!isHost) return; // ゲストは F でペイント切替不可
    isPaintingMode = !isPaintingMode;
    updatePointerLockState();
    updateUI();
  }
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

const mouseLookSensitivity = 0.002;
window.addEventListener("mousemove", e => {
  if (pointerLocked && !isPaintingMode) {
    yaw -= e.movementX * mouseLookSensitivity;
    if (!isHost) {
      pitch -= e.movementY * mouseLookSensitivity;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));
    }
  }
  if (painting && isHost && isPaintingMode) paintAtMouse(e);
});

window.addEventListener("mousedown", e => {
  if (isHost) {
    if (isPaintingMode && e.button === 0) { painting = true; paintAtMouse(e); }
    return;
  }
  if (!pointerLocked && e.button === 0) {
    document.body.requestPointerLock();
    return;
  }
  if (pointerLocked && e.button === 0) {
    shootLaser();
  }
});
window.addEventListener("mouseup", () => painting = false);

window.addEventListener("wheel", e => {
  if (isHost && isPaintingMode) {
    camera.position.z += e.deltaY * 0.05;
  }
});

function updatePointerLockState() {
  if (isHost) {
    if (isPaintingMode) {
      if (pointerLocked) document.exitPointerLock();
    } else {
      document.body.requestPointerLock();
    }
  } else {
    if (!pointerLocked) document.body.requestPointerLock();
  }
}

/* -------------------------
   Paint: myVisual (カメレオン) に描く（ホストのみ）
   - レイキャストで myVisual に当たった UV を取得してキャンバスに描画
   ------------------------- */
function paintAtMouse(e) {
  try {
    if (!isHost) return; // ゲストでは描かない
    if (!chameleonCtx || !renderer) return;
    const rect = renderer.domElement.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(x, y), camera);
    const hits = ray.intersectObject(myVisual, true);
    if (hits.length === 0) return;
    const hit = hits[0];
    const uv = hit.uv;
    if (!uv) return;
    const px = Math.floor(uv.x * chameleonCanvas.width);
    const py = Math.floor((1 - uv.y) * chameleonCanvas.height);
    chameleonCtx.fillStyle = brushColor;
    chameleonCtx.beginPath();
    chameleonCtx.arc(px, py, brushSize, 0, Math.PI * 2);
    chameleonCtx.fill();
    chameleonTex.needsUpdate = true;
    // ネットワーク同期が必要ならここで送信
    // sendState({ type: "paint", uv: { x: uv.x, y: uv.y }, color: brushColor, size: brushSize });
  } catch (err) {
    console.error("paintAtMouse error:", err);
  }
}

/* -------------------------
   Movement and physics
   ------------------------- */
let vy = 0, onGround = true;
function updatePlayer() {
  if (!myHitbox) return;
  let moveF = 0, moveS = 0;
  const speed = 0.3;
  if (keys["w"]) moveF = speed;
  if (keys["s"]) moveF = -speed;
  if (keys["a"]) moveS = -speed;
  if (keys["d"]) moveS = speed;
  if (!isHost) { moveF = -moveF; moveS = -moveS; }
  const dirX = Math.sin(yaw), dirZ = Math.cos(yaw);
  myHitbox.position.x += dirX * moveF + -dirZ * moveS;
  myHitbox.position.z += dirZ * moveF + dirX * moveS;
  if (keys[" " ] && onGround) { vy = 0.35; onGround = false; }
  vy += -0.02;
  myHitbox.position.y += vy;
  if (myHitbox.position.y <= 2) { myHitbox.position.y = 2; vy = 0; onGround = true; }
  myVisual.position.copy(myHitbox.position);
}

/* -------------------------
   Camera update (safe)
   ------------------------- */
function updateCamera() {
  if (!myHitbox) return;
  if (isHost) {
    const offsetX = Math.sin(yaw) * TPS_DISTANCE;
    const offsetZ = Math.cos(yaw) * TPS_DISTANCE;
    camera.position.set(myHitbox.position.x - offsetX, myHitbox.position.y + TPS_HEIGHT, myHitbox.position.z - offsetZ);
    if (camera.position.y < 1) camera.position.y = 1;
    camera.lookAt(myHitbox.position);
  } else {
    camera.position.set(myHitbox.position.x, myHitbox.position.y + 3, myHitbox.position.z);
    camera.rotation.set(pitch, yaw, 0);
  }
}

/* -------------------------
   Render loop protected
   ------------------------- */
function animate() {
  try {
    requestAnimationFrame(animate);
    updatePlayer();
    updateCamera();
    renderer.render(scene, camera);
  } catch (err) {
    console.error("animate error:", err);
  }
}

/* -------------------------
   Helpers
   ------------------------- */
function shootLaser() { console.log("shoot"); }

/* -------------------------
   Init
   ------------------------- */
initPeer();
updateUI();
animate();

</script>
</body>
</html>
