<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Chameleon 3D</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; }
  </style>
</head>
<body>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>

// ============================
// Three.js 基本セット
// ============================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 2000
);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 50, 20);
scene.add(light);

// ============================
// 床
// ============================
const floor = new THREE.Mesh(
  new THREE.BoxGeometry(200, 1, 200),
  new THREE.MeshStandardMaterial({ color: 0x444444 })
);
floor.position.set(0, -0.5, 0);
scene.add(floor);

// ============================
// 壁（当たり判定なし）
// ============================
function addWall(x, y, z, rotY) {
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(200, 40, 2),
    new THREE.MeshStandardMaterial({ color: 0x666666 })
  );
  wall.position.set(x, y, z);
  wall.rotation.y = rotY;
  scene.add(wall);
}

addWall(0, 20.5, -100, 0);
addWall(0, 20.5, 100, 0);
addWall(-100, 20.5, 0, Math.PI/2);
addWall(100, 20.5, 0, Math.PI/2);

// ============================
// プレイヤー（カメレオン）
// ============================
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 3),
  new THREE.MeshStandardMaterial({ color: 0xff5555 })
);
player.position.set(0, 2, 0);
scene.add(player);

// 入力
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

let vy = 0;
const speed = 0.3;
const gravity = -0.02;
let onGround = true;
// ============================
// 車
// ============================
function addCar(x, z) {
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(6, 2, 12),
    new THREE.MeshStandardMaterial({ color: 0x2222aa })
  );
  body.position.set(x, 1, z);
  scene.add(body);

  const top = new THREE.Mesh(
    new THREE.BoxGeometry(4, 2, 6),
    new THREE.MeshStandardMaterial({ color: 0x4444ff })
  );
  top.position.set(x, 3, z);
  scene.add(top);
}

addCar(20, 20);
addCar(-30, -10);

// ============================
// イス
// ============================
function addChair(x, z) {
  const seat = new THREE.Mesh(
    new THREE.BoxGeometry(2, 0.5, 2),
    new THREE.MeshStandardMaterial({ color: 0x885522 })
  );
  seat.position.set(x, 1, z);
  scene.add(seat);

  const back = new THREE.Mesh(
    new THREE.BoxGeometry(2, 3, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x553311 })
  );
  back.position.set(x, 2.5, z - 1);
  scene.add(back);
}

addChair(10, 5);
addChair(-15, 25);

// ============================
// 机
// ============================
function addDesk(x, z) {
  const top = new THREE.Mesh(
    new THREE.BoxGeometry(8, 1, 4),
    new THREE.MeshStandardMaterial({ color: 0x996633 })
  );
  top.position.set(x, 3, z);
  scene.add(top);

  const legGeo = new THREE.BoxGeometry(1, 3, 1);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x664422 });

  const offsets = [
    [-3, -1], [3, -1], [-3, 1], [3, 1]
  ];

  offsets.forEach(o => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(x + o[0], 1.5, z + o[1]);
    scene.add(leg);
  });
}

addDesk(-10, 15);
addDesk(25, -20);

// ============================
// 障害物ブロック
// ============================
function addBlock(x, z, w, h, d, color) {
  const block = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color })
  );
  block.position.set(x, h/2, z);
  scene.add(block);
}

addBlock(0, 30, 10, 10, 10, 0xaa3333);
addBlock(40, 0, 20, 5, 20, 0x3333aa);
// ============================
// プレイヤー更新（当たり判定なし）
// ============================
function updatePlayer() {

  let moveX = 0;
  let moveZ = 0;

  if (keys["w"]) moveZ =  speed;
  if (keys["s"]) moveZ = -speed;
  if (keys["a"]) moveX = -speed;
  if (keys["d"]) moveX =  speed;

  const angle = camera.rotation.y;
  const sin = Math.sin(angle);
  const cos = Math.cos(angle);

  // 前後
  player.position.x += moveZ * sin;
  player.position.z += moveZ * cos;

  // 左右
  player.position.x -= moveX * cos;
  player.position.z += moveX * sin;

  // ジャンプ
  if (keys["arrowup"] && onGround) {
    vy = 0.35;
    onGround = false;
  }

  vy += gravity;
  player.position.y += vy;

  if (player.position.y <= 2) {
    player.position.y = 2;
    vy = 0;
    onGround = true;
  }
}
// ============================
// TPSカメラ追跡
// ============================
function updateCamera() {
  const dist = 15;
  const height = 8;

  const angle = camera.rotation.y;
  const offsetX = Math.sin(angle) * dist;
  const offsetZ = Math.cos(angle) * dist;

  camera.position.x += ((player.position.x - offsetX) - camera.position.x) * 0.1;
  camera.position.y += ((player.position.y + height) - camera.position.y) * 0.1;
  camera.position.z += ((player.position.z - offsetZ) - camera.position.z) * 0.1;

  camera.lookAt(player.position);
}

// ============================
// 描画ループ
// ============================
function animate() {
  requestAnimationFrame(animate);

  updatePlayer();
  updateCamera();

  renderer.render(scene, camera);
}
animate();

// ============================
// リサイズ
// ============================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
