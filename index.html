<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>めっちゃカメレオン 3D（当たり判定付き）</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; font-family:sans-serif; }
    #info { position:fixed; top:10px; left:10px; z-index:10; }
    #status { position:fixed; top:30px; left:10px; z-index:10; }
  </style>
</head>
<body>
<div id="info">WASD移動 / ↑ジャンプ / スペース色チェンジ</div>
<div id="status">通信準備中...</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>

/* ============================
   Three.js 基本セット
============================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 2000
);
camera.position.set(0, 10, 20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 50, 20);
scene.add(light);

/* ============================
   広い部屋（床＋壁）
============================ */
const obstacles = []; // 当たり判定用

const floorGeo = new THREE.BoxGeometry(200, 1, 200);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.set(0, -0.5, 0);
scene.add(floor);

function addWall(x, y, z, rotY) {
  const wallGeo = new THREE.BoxGeometry(200, 40, 2);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.set(x, y, z);
  wall.rotation.y = rotY;
  scene.add(wall);
  obstacles.push(wall);
}

addWall(0, 20.5, -100, 0);
addWall(0, 20.5, 100, 0);
addWall(-100, 20.5, 0, Math.PI/2);
addWall(100, 20.5, 0, Math.PI/2);

/* ============================
   カメレオン
============================ */
let myColorIndex = 0;

const chamGeo = new THREE.BoxGeometry(1.5, 1.5, 3); // ← boundingBox小さめ
const myChamMat = new THREE.MeshStandardMaterial({ color: 0xff5555 });
const myCham = new THREE.Mesh(chamGeo, myChamMat);
myCham.position.set(0, 2, 0);
scene.add(myCham);

/* ============================
   入力
============================ */
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

/* ============================
   状態
============================ */
let vy = 0;
const baseSpeed = 0.3;
const gravity = -0.02;
let onGround = true;
let lastColorChange = 0;

/* ============================
   AABB当たり判定（修正版）
============================ */
function isColliding(obj1, obj2) {
  obj1.geometry.computeBoundingBox();
  obj2.geometry.computeBoundingBox();

  const box1 = obj1.geometry.boundingBox.clone();
  const box2 = obj2.geometry.boundingBox.clone();

  box1.min.add(obj1.position);
  box1.max.add(obj1.position);

  box2.min.add(obj2.position);
  box2.max.add(obj2.position);

  return box1.intersectsBox(box2);
}
/* ============================
   車
============================ */
function addCar(x, z) {
  const bodyGeo = new THREE.BoxGeometry(6, 2, 12);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2222aa });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(x, 1, z);
  scene.add(body);
  obstacles.push(body);

  const topGeo = new THREE.BoxGeometry(4, 2, 6);
  const topMat = new THREE.MeshStandardMaterial({ color: 0x4444ff });
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.set(x, 3, z);
  scene.add(top);
  obstacles.push(top);
}

addCar(20, 20);
addCar(-30, -10);
addCar(40, -40);

/* ============================
   イス
============================ */
function addChair(x, z) {
  const seatGeo = new THREE.BoxGeometry(2, 0.5, 2);
  const seatMat = new THREE.MeshStandardMaterial({ color: 0x885522 });
  const seat = new THREE.Mesh(seatGeo, seatMat);
  seat.position.set(x, 1, z);
  scene.add(seat);
  obstacles.push(seat);

  const backGeo = new THREE.BoxGeometry(2, 3, 0.5);
  const backMat = new THREE.MeshStandardMaterial({ color: 0x553311 });
  const back = new THREE.Mesh(backGeo, backMat);
  back.position.set(x, 2.5, z - 1);
  scene.add(back);
  obstacles.push(back);
}

addChair(10, 5);
addChair(12, 5);
addChair(-15, 25);

/* ============================
   机
============================ */
function addDesk(x, z) {
  const topGeo = new THREE.BoxGeometry(8, 1, 4);
  const topMat = new THREE.MeshStandardMaterial({ color: 0x996633 });
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.set(x, 3, z);
  scene.add(top);
  obstacles.push(top);

  const legGeo = new THREE.BoxGeometry(1, 3, 1);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x664422 });

  const offsets = [
    [-3, -1], [3, -1], [-3, 1], [3, 1]
  ];

  offsets.forEach(o => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(x + o[0], 1.5, z + o[1]);
    scene.add(leg);
    obstacles.push(leg);
  });
}

addDesk(-10, 15);
addDesk(25, -20);
addDesk(-40, -35);

/* ============================
   障害物ブロック
============================ */
function addBlock(x, z, w, h, d, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color });
  const block = new THREE.Mesh(geo, mat);
  block.position.set(x, h / 2, z);
  scene.add(block);
  obstacles.push(block);
}

addBlock(0, 30, 10, 10, 10, 0xaa3333);
addBlock(-20, -30, 5, 15, 5, 0x33aa33);
addBlock(40, 0, 20, 5, 20, 0x3333aa);
addBlock(-50, 40, 15, 8, 15, 0x8844aa);

/* ============================
   色ゾーン判定
============================ */
function getZoneAt(x) {
  if (x < -33) return 0;
  if (x < 33)  return 1;
  return 2;
}
/* ============================
   プレイヤー更新
============================ */
function updateMyChameleon() {

  const speed = baseSpeed;

  // 移動前の位置を保存
  const oldX = myCham.position.x;
  const oldY = myCham.position.y;
  const oldZ = myCham.position.z;

  let moveX = 0;
  let moveZ = 0;

  if (keys["w"]) moveZ =  speed;
  if (keys["s"]) moveZ = -speed;
  if (keys["a"]) moveX = -speed;
  if (keys["d"]) moveX =  speed;

  const angle = camera.rotation.y;
  const sin = Math.sin(angle);
  const cos = Math.cos(angle);

  // 前後
  myCham.position.x += moveZ * sin;
  myCham.position.z += moveZ * cos;

  // 左右（反転済み）
  myCham.position.x -= moveX * cos;
  myCham.position.z += moveX * sin;

  /* ---- 当たり判定 ---- */
  for (const obs of obstacles) {
    if (isColliding(myCham, obs)) {
      myCham.position.set(oldX, oldY, oldZ);
      break;
    }
  }

  /* ---- ジャンプ ---- */
  if (keys["arrowup"] && onGround) {
    vy = 0.35;
    onGround = false;
  }

  vy += gravity;
  myCham.position.y += vy;

  if (myCham.position.y <= 2) {
    myCham.position.y = 2;
    vy = 0;
    onGround = true;
  }

  /* ---- 色チェンジ ---- */
  if (keys[" "] && performance.now() - lastColorChange > 200) {
    myColorIndex = (myColorIndex + 1) % 3;
    const newColor = [0xff5555, 0x55ff55, 0x5599ff][myColorIndex];
    myChamMat.color.setHex(newColor);
    lastColorChange = performance.now();
  }

  /* ---- ステルス ---- */
  const zoneIndex = getZoneAt(myCham.position.x);
  if (myColorIndex === 1 && zoneIndex === 1) {
    myChamMat.transparent = true;
    myChamMat.opacity = 0.3;
  } else {
    myChamMat.transparent = false;
    myChamMat.opacity = 1.0;
  }
}
/* ============================
   TPSカメラ追跡
============================ */
function updateCamera() {
  const camDistance = 15;
  const camHeight   = 8;

  const angle = camera.rotation.y;
  const offsetX = Math.sin(angle) * camDistance;
  const offsetZ = Math.cos(angle) * camDistance;

  camera.position.x += ((myCham.position.x - offsetX) - camera.position.x) * 0.1;
  camera.position.y += ((myCham.position.y + camHeight) - camera.position.y) * 0.1;
  camera.position.z += ((myCham.position.z - offsetZ) - camera.position.z) * 0.1;

  camera.lookAt(myCham.position);
}

/* ============================
   描画ループ
============================ */
function animate() {
  requestAnimationFrame(animate);

  updateMyChameleon();
  updateCamera();

  renderer.render(scene, camera);
}
animate();

/* ============================
   リサイズ対応
============================ */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
